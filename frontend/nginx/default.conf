# Konfiguracja serwera Nginx dla aplikacji

server {
    # Nasłuchuj na porcie 80
    listen 80;

    # Główna lokalizacja - serwuj pliki statyczne z Reacta
    location / {
        # Główny katalog z plikami
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Kluczowe dla aplikacji typu Single Page Application (SPA)
        # Jeśli plik nie zostanie znaleziony, zwróć index.html,
        # aby React Router mógł przejąć routing po stronie klienta.
        try_files $uri $uri/ /index.html;
    }

    # Przekierowanie zapytań do API do kontenera backendu
    location /api {
        # Usuwamy /api z początku ścieżki
        rewrite /api/(.*) /$1 break;
        
        # Ustawiamy proxy do kontenera 'backend' na porcie 8000
        # Nazwa 'backend' jest rozwiązywana przez wewnętrzny DNS Dockera
        proxy_pass http://backend:8000;
        
        # Ustawiamy nagłówki, aby przekazać oryginalne informacje do backendu
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Opcjonalnie: Obsługa błędów
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}